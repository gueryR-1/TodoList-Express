<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo List - Versión 1</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <section class="card">
      <h1>LISTA DE TAREAS</h1>
      <p class="subtitle">Listar tareas para hacerlas con estados segun el avance.</p>

      <form id="taskForm" class="task-form">
        <div class="form-group">
          <label for="taskTitle">Nombre de la tarea:</label>
          <input
            type="text"
            id="taskTitle"
            placeholder="Ejemplo: Estudiar programación web"
            autocomplete="on"
          />
        </div>

        <div class="form-group">
          <label for="taskStatus">Estado</label>
          <select id="taskStatus">
            <option value="pendiente">Pendiente</option>
            <option value="en-proceso">En proceso</option>
            <option value="completada">Completada</option>
          </select>
        </div>

        <button type="submit">Crear tarea</button>
      </form>

      <p id="message" class="message"></p>
    </section>

    <section class="card">
      <div class="list-header">
        <h2>Mis tareas</h2>
        <span id="taskCounter">0 tareas</span>
      </div>

      <ul id="taskList" class="task-list"></ul>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
